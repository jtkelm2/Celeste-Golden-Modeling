# Benchmark configuration
# Each [[strategies]] entry specifies one strategy variant to benchmark.
# Required fields: type, simulations
# Per-type optional fields are noted below.

[[strategies]]
type = "naive_grind"
simulations = 1000

[[strategies]]
type = "cyclic_grind"
simulations = 1000

# backward_learning: optional chunk_size (default 1)
[[strategies]]
type = "backward_learning"
simulations = 1000

[[strategies]]
type = "backward_learning"
simulations = 1000
chunk_size = 5

# mastery: optional k (default 5)
[[strategies]]
type = "mastery"
simulations = 500
k = 3

[[strategies]]
type = "mastery"
simulations = 500
k = 5

[[strategies]]
